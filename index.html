<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Treino &mdash; Fran</title>
<meta name="color-scheme" content="dark">
<style>
  :root{--bg:#141413;--surface:#1e1e1c;--border:#2e2e2b;--border-strong:#444440;--text:#e8e8e2;--text-muted:#9b9b93;--text-hint:#6b6b65;--blue-bg:#0c2a45;--blue-text:#85b7eb;--green-bg:#122208;--green-text:#97c459;--amber-bg:#2a1c05;--amber-text:#fac775;--pink-bg:#2a0d1a;--pink-text:#f0a0c0;--radius:10px;--radius-sm:6px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;color-scheme:dark}
  .app-shell{max-width:720px;margin:0 auto;padding:0 0 60px}
  .topbar{background:#181816;border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:10}
  .topbar-title{font-size:16px;font-weight:600;margin-bottom:10px}
  .nav{display:flex;gap:6px;flex-wrap:wrap}
  .nav-btn{padding:7px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
  .nav-btn:hover{background:var(--bg)}
  .nav-btn.active{background:#0c2a45;color:#85b7eb;border-color:transparent}
  .content{padding:20px}
  .screen{display:none}.screen.active{display:block}
  .week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
  .week-info .week-title{font-size:18px;font-weight:600}
  .week-info .week-phase{font-size:12px;color:var(--text-muted);margin-top:2px}
  .week-nav{display:flex;align-items:center;gap:8px}
  .week-nav button{width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:16px;color:var(--text-muted);display:flex;align-items:center;justify-content:center}
  .week-nav button:hover{background:var(--bg)}
  .week-nav span{font-size:13px;font-weight:600;min-width:28px;text-align:center}
  .deload-banner{background:var(--amber-bg);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--amber-text);display:none}
  .deload-banner.show{display:block}
  .week-tip{font-size:12px;color:var(--text-muted);background:var(--surface);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:14px;border-left:2px solid #378add;display:none}
  .day-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .day-tab{padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text-muted);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
  .day-tab:hover{background:var(--surface)}
  .day-tab.active{background:var(--surface);color:var(--text);border-color:var(--border-strong);font-weight:600}
  .ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
  .ex-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:8px}
  .ex-name{font-size:14px;font-weight:600;line-height:1.4}
  .ex-meta{font-size:12px;color:var(--text-muted);margin-top:3px}
  .pr-badge{font-size:11px;padding:3px 9px;border-radius:var(--radius-sm);background:var(--green-bg);color:var(--green-text);font-weight:600;white-space:nowrap;flex-shrink:0}
  .btipo{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;vertical-align:middle;margin-left:6px}
  .bc{background:#0c2a45;color:#85b7eb}
  .bi{background:#1a1a08;color:#b8a838}
  .bg{background:var(--pink-bg);color:var(--pink-text)}
  .bcore{background:#1a0a1a;color:#c09de0}
  .rir-hint{font-size:12px;color:var(--text-muted);background:#252520;border-radius:var(--radius-sm);padding:6px 10px;margin-bottom:10px;border-left:2px solid var(--border-strong)}
  .sets-table{width:100%;border-collapse:collapse}
  .sets-table th{font-size:11px;color:var(--text-hint);font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:0 4px 8px;text-align:left}
  .sets-table th:nth-child(2),.sets-table th:nth-child(3){text-align:center}
  .sets-table th:last-child{text-align:center;width:44px}
  .sets-table td{padding:4px;vertical-align:middle}
  .set-num-cell{font-size:12px;color:var(--text-muted);padding-right:8px;white-space:nowrap}
  .set-input{border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 8px;font-size:13px;width:100%;background:#2a2a27;color:var(--text);text-align:center;outline:none}
  .set-input:focus{border-color:#378add;box-shadow:0 0 0 3px rgba(55,138,221,.12)}
  .set-done{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-hint);margin:0 auto;transition:all .15s}
  .set-done:hover{border-color:#27500a}
  .set-done.checked{background:var(--green-bg);border-color:#639922;color:var(--green-text)}
  .phint{font-size:12px;color:var(--text-hint);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
  .phint.due{color:#854f0b;font-weight:500;background:var(--amber-bg);border-radius:var(--radius-sm);padding:8px 10px;border:none;margin-top:10px}
  .phint.gdue{color:var(--pink-text);background:var(--pink-bg);border-radius:var(--radius-sm);padding:8px 10px;border:none;margin-top:6px}
  .thint{font-size:12px;border-radius:var(--radius-sm);padding:8px 10px;margin-top:6px}
  .save-btn{width:100%;padding:13px;border-radius:var(--radius);background:#0f6e56;color:#9fe1cb;border:none;cursor:pointer;font-size:15px;font-weight:600;margin-top:8px;transition:background .15s}
  .save-btn:hover{background:#085041}
  .save-msg{text-align:center;font-size:13px;color:var(--green-text);margin-top:8px;min-height:20px;font-weight:500}
  .ov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
  .ov-card{background:var(--bg);border-radius:var(--radius-sm);padding:14px}
  .ov-label{font-size:11px;color:var(--text-muted);margin-bottom:4px}
  .ov-val{font-size:22px;font-weight:700}
  .ov-sub{font-size:11px;color:var(--text-hint);margin-top:2px}
  .pbar-wrap{background:var(--border);border-radius:4px;height:6px;margin:8px 0 4px}
  .pbar{background:#378add;height:6px;border-radius:4px;transition:width .3s}
  .plabel{font-size:11px;color:var(--text-muted);text-align:right;margin-bottom:16px}
  .prog-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
  .prog-ex-name{font-size:13px;font-weight:600;margin-bottom:10px}
  .h-table{width:100%;border-collapse:collapse;font-size:12px}
  .h-table th{color:var(--text-hint);font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:0 4px 6px;text-align:left;font-weight:600}
  .h-table td{padding:5px 4px;border-top:1px solid var(--border);color:var(--text-muted)}
  .h-table td:first-child{color:var(--text);font-weight:500}
  .trend-up{color:var(--green-text);font-weight:600}
  .plano-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
  .plano-card.current{border:2px solid #378add}
  .plano-wlabel{font-size:11px;color:var(--text-hint);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
  .plano-title{font-size:14px;font-weight:600;margin-bottom:4px}
  .plano-desc{font-size:13px;color:var(--text-muted);margin-bottom:8px}
  .plano-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
  .badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:var(--radius-sm);font-weight:600}
  .bvol{background:var(--blue-bg);color:var(--blue-text)}
  .bprog{background:var(--green-bg);color:var(--green-text)}
  .bdeload{background:var(--amber-bg);color:var(--amber-text)}
  .bpico{background:var(--pink-bg);color:var(--pink-text)}
  .go-btn{font-size:12px;padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text-muted)}
  .go-btn:hover{background:var(--bg)}
  .section-title{font-size:16px;font-weight:600;margin-bottom:14px}
  .empty-msg{text-align:center;font-size:13px;color:var(--text-hint);padding:24px 0}
  .warmup-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
  .warmup-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
  .warmup-header-left{display:flex;align-items:center;gap:8px}
  .warmup-icon{font-size:16px}
  .warmup-title{font-size:13px;font-weight:600;color:var(--amber-text)}
  .warmup-sub{font-size:11px;color:var(--text-hint);margin-top:1px}
  .warmup-chevron{font-size:18px;color:var(--text-hint);transition:transform .2s}
  .warmup-chevron.open{transform:rotate(180deg)}
  .warmup-body{display:none;padding:0 16px 14px;border-top:1px solid var(--border)}
  .warmup-body.open{display:block}
  .warmup-item{padding:10px 0;border-bottom:1px solid var(--border)}
  .warmup-item:last-child{border-bottom:none}
  .warmup-item-name{font-size:13px;font-weight:600;margin-bottom:3px}
  .warmup-item-detail{font-size:12px;color:var(--text-muted);line-height:1.5}
</style>
</head>
<body>
<div class="app-shell">
  <div class="topbar">
    <div class="topbar-title">Meu Treino &mdash; Fran &#128170;</div>
    <nav class="nav">
      <button class="nav-btn active" onclick="showScreen('treino')">Treino</button>
      <button class="nav-btn" onclick="showScreen('progresso')">Progresso</button>
      <button class="nav-btn" onclick="showScreen('plano')">Plano 24 semanas</button>
    </nav>
  </div>
  <div class="content">
    <div class="screen active" id="screen-treino">
      <div class="week-header">
        <div class="week-info">
          <div class="week-title" id="week-title">Semana 1</div>
          <div class="week-phase" id="week-phase">Fase: Calibra&ccedil;&atilde;o</div>
        </div>
        <div class="week-nav">
          <button onclick="changeWeek(-1)">&#8249;</button>
          <span id="week-num">S1</span>
          <button onclick="changeWeek(1)">&#8250;</button>
        </div>
      </div>
      <div class="deload-banner" id="deload-banner">&#9888; <strong>Semana de deload:</strong> reduza o volume em ~40%, mantenha a carga. A hipertrofia real acontece aqui.</div>
      <div class="week-tip" id="week-tip"></div>
      <div class="day-tabs" id="day-tabs"></div>
      <div id="exercises-container"></div>
      <button class="save-btn" onclick="saveSession()">Salvar treino</button>
      <div class="save-msg" id="save-msg"></div>
    </div>
    <div class="screen" id="screen-progresso">
      <div class="section-title">Meu progresso</div>
      <div class="ov-grid">
        <div class="ov-card"><div class="ov-label">Treinos salvos</div><div class="ov-val" id="ov-sessions">0</div></div>
        <div class="ov-card"><div class="ov-label">Semana atual</div><div class="ov-val" id="ov-week">1</div><div class="ov-sub" id="ov-phase">Calibra&ccedil;&atilde;o</div></div>
        <div class="ov-card"><div class="ov-label">Progresso total</div><div class="ov-val" id="ov-pct">0%</div><div class="ov-sub">das 24 semanas</div></div>
      </div>
      <div class="pbar-wrap"><div class="pbar" id="prog-bar" style="width:0%"></div></div>
      <div class="plabel" id="prog-label">Semana 1 de 24</div>
      <div id="progress-list"></div>
    </div>
    <div class="screen" id="screen-plano">
      <div class="section-title">Plano junho &rarr; dezembro</div>
      <div id="plano-list"></div>
    </div>
  </div>
</div>
<script>
const WARMUPS={
  "diaA":[
    {name:"Rotação torácica no chão",detail:"10 rep cada lado — deite de lado, joelho dobrado 90°, rotacione o braço superior abrindo o peito. Lento e controlado."},

const DAYS=[
  {id:"diaA",label:"Segunda — Peito + Costas",short:"Treino A",exercises:[

    {id:"rosca_ez",name:"Rosca direta barra EZ",sets:3,rep:"10–12",rest:"75s",tipo:"i",prog:1},

  {id:"diaD",label:"Domingo — Quadril + Core",short:"Treino D",exercises:[

    {id:"ext_unilat",name:"Cadeira extensora unilateral",sets:3,rep:"12–15",rest:"60s",tipo:"i",prog:1},
    {id:"monster_walk",name:"Monster walk c/ elástico",sets:3,rep:"15 passos",rest:"60s",tipo:"i",prog:0,gm:true},
    {id:"calf",name:"Panturrilha em pé",sets:4,rep:"15–20",rest:"45s",tipo:"i",prog:1},
    {id:"prancha",name:"Prancha frontal",sets:3,rep:"30–45s",rest:"60s",tipo:"core",prog:0}
  ]}
];

const WEEKS=[
  {w:1,ph:"Calibração",desc:"Encontre o peso certo com RIR 2 &mdash; termine cada série com 2 reps sobrando. Anote os pesos como base.",t:"n"},

  {w:17,ph:"Volume máximo",desc:"Mantenha o volume máximo. Progrida reps e cargas onde possível.",t:"n"},
  {w:18,ph:"Volume máximo",desc:"Técnicas avançadas consolidadas. Drop sets e rest-pause nos isolamentos.",t:"n"},
  {w:19,ph:"Volume máximo",desc:"Semana mais dura do ciclo. 3 exercícios de glúteo médio ativos por treino de inferior.",t:"n"},

  {w:24,ph:"Dezembro &#127919;",desc:"Chegou! Faça um treino completo, registre os PRs finais e compare com a semana 1.",t:"pico"}

const TIPS={
  1:"RIR 2: termine cada série com 2 reps ainda sobrando. Parece fácil no início — é proposital.",
  6:"Progressão: quem chegou no limite superior de reps nas semanas 3-4, aumente o peso hoje.",
  11:"Drop sets: ao falhar, reduza 30% do peso imediatamente e continue até falhar de novo.",
  13:"Rest-pause: escolha 1 isolamento por dia. Após falhar, 10-15s de pausa, mais 3-4 reps.",
  16:"Volume máximo: adicione 1 série extra nos compostos esta semana.",
  21:"Pico: -1 série por exercício, +5% de carga. Supercompensação ativa.",
  24:"Semana final! Compare seus PRs com a semana 1 e veja toda a evolução."
};

let S={w:1,d:0,sessions:{},sets:{}};
function LS(){try{const s=localStorage.getItem("fran_v3");if(s)S=JSON.parse(s);}catch(e){}}
function SS(){try{localStorage.setItem("fran_v3",JSON.stringify(S));}catch(e){}}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("screen-"+id).classList.add("active");
  ["treino","progresso","plano"].forEach((n,i)=>{if(n===id)document.querySelectorAll(".nav-btn")[i].classList.add("active");});
  if(id==="progresso")rProg();
  if(id==="plano")rPlano();
}

function changeWeek(d){S.w=Math.max(1,Math.min(24,S.w+d));SS();rWH();rEx();}

function rWH(){
  const wk=WEEKS[S.w-1];
  document.getElementById("week-title").textContent="Semana "+S.w;
  document.getElementById("week-phase").textContent="Fase: "+wk.ph;
  document.getElementById("week-num").textContent="S"+S.w;
  document.getElementById("deload-banner").classList.toggle("show",wk.t==="d");
  const te=document.getElementById("week-tip");
  if(TIPS[S.w]){te.textContent="&#128161; "+TIPS[S.w];te.style.display="block";te.innerHTML="&#128161; "+TIPS[S.w];}
  else te.style.display="none";
}

function rTabs(){
  const c=document.getElementById("day-tabs");c.innerHTML="";
  DAYS.forEach((day,i)=>{
    const b=document.createElement("button");
    b.className="day-tab"+(i===S.d?" active":"");
    b.textContent=day.short;
    b.onclick=()=>{S.d=i;SS();rTabs();rEx();};
    c.appendChild(b);
  });
}

function gk(w,di,ei,s){return"w"+w+"_"+di+"_"+ei+"_s"+s;}
function bestW(id){
  let b=0;
  Object.keys(S.sets).forEach(k=>{if(k.includes("_"+id+"_s")){const w=S.sets[k].weight||0;if(w>b)b=w;}});
  return b>0?b:null;
}

function rEx(){
  const day=DAYS[S.d];
  const wk=WEEKS[S.w-1];
  const isD=wk.t==="d",isP=wk.t==="p",isPico=wk.t==="pico";
  const c=document.getElementById("exercises-container");c.innerHTML="";

  // Render warmup section
  const wu=WARMUPS[day.id];
  if(wu){
    const wuId="warmup-"+day.id;
    const ws=document.createElement("div");
    ws.className="warmup-section";
    let wuItems=wu.map(w=>`
      <div class="warmup-item">
        <div class="warmup-item-name">${w.name}</div>
        <div class="warmup-item-detail">${w.detail}</div>
      </div>`).join("");
    ws.innerHTML=`
      <div class="warmup-header" onclick="tWU('${wuId}')">
        <div class="warmup-header-left">
          <span class="warmup-icon">&#9728;&#65039;</span>
          <div>
            <div class="warmup-title">Aquecimento &mdash; ${wu.length} exercícios</div>
            <div class="warmup-sub">Toque para expandir &middot; ~8 min antes do treino principal</div>
          </div>
        </div>
        <span class="warmup-chevron" id="chev-${wuId}">&#8964;</span>
      </div>
      <div class="warmup-body" id="${wuId}">${wuItems}</div>`;
    c.appendChild(ws);
  }

  day.exercises.forEach(ex=>{
    const pr=bestW(ex.id);
    const isCo=ex.tipo==="c",isGM=ex.gm===true,isCo2=ex.tipo==="core";
    const pk=ex.prog||(isCo?2.5:1);
    const sts=isD?Math.max(2,ex.sets-2):(isP||isPico)?Math.max(2,ex.sets-1):ex.sets;

    let bh="";
    const progSuffix=(isP&&pk>0)?" &middot; +"+pk+"kg esta semana":"";
    if(isGM) bh=`<span class="btipo bg">Glúteo Médio${progSuffix}</span>`;
    else if(isCo2) bh=`<span class="btipo bcore">Core</span>`;
    else if(isCo) bh=`<span class="btipo bc">Composto${progSuffix}</span>`;
    else bh=`<span class="btipo bi">Isolamento${progSuffix}</span>`;

    let rirH=(!isD&&!isCo2&&ex.prog>0)?`<div class="rir-hint">RIR 2 &mdash; termine esta série com 2 reps ainda sobrando.</div>`:"";

    let ph="";
    if(isP){
      ph=isGM
        ?`<div class="phint gdue">&#9650; Progressão de glúteo médio! Se completou todas as séries com boa forma, aumente <strong>${pk}kg</strong>.</div>`
        :`<div class="phint due">&#9650; Progressão! Se chegou no limite superior de reps em todas as séries, aumente <strong>${pk}kg</strong> e volte ao limite inferior.</div>`;
    } else if(isD){
      ph=`<div class="phint">Deload: faça ${sts} séries com a mesma carga.</div>`;
    } else {
      const np=WEEKS.findIndex((w,i)=>i>=S.w&&w.t==="p")+1;
      ph=`<div class="phint">Dupla progressão: progrida as reps primeiro, depois aumente o peso.${np>0?" Próxima progressão: S"+np:""}</div>`;
    }

    let th="";
    if((S.w===11||S.w===12)&&!isCo&&!isCo2)
      th=`<div class="thint" style="background:#1a1a08;color:#b8a838;">&#128161; <strong>Drop set:</strong> na última série, ao falhar reduza 30% do peso e continue até falhar de novo. Sem descanso.</div>`;
    else if(S.w===13&&!isCo&&!isCo2)
      th=`<div class="thint" style="background:#1a1a08;color:#b8a838;">&#128161; <strong>Rest-pause (1 isolamento por dia):</strong> ao falhar, descanse 10-15s e faça mais 3-4 reps.</div>`;
    else if(S.w===18&&!isCo&&!isCo2)
      th=`<div class="thint" style="background:#1a1a08;color:#b8a838;">&#128161; Aplique drop sets e rest-pause. Use o que funcionou melhor nos blocos anteriores.</div>`;
    else if((isP||isPico)&&isCo&&S.w>=21)
      th=`<div class="thint" style="background:#0c2a45;color:#85b7eb;">&#128170; <strong>Pico:</strong> ${sts} séries com +5% de carga.</div>`;

    // Optional swap hints at weeks 6, 11, 16 for isolation exercises
    const SWAPS={
      "crucifixo":"&#128260; <strong>Troca opcional (S6/S11/S16):</strong> pode substituir por Crossover no cabo &mdash; mesmo músculo, tensão constante.",
      "kickback":"&#128260; <strong>Troca opcional (S6/S11/S16):</strong> pode substituir por Glúteo na máquina ou hip extension no cabo.",
      "elev_lat":"&#128260; <strong>Troca opcional (S6/S11/S16):</strong> pode alternar entre cabo e halter a cada bloco.",
      "rosca_ez":"&#128260; <strong>Troca opcional (S6/S11/S16):</strong> pode substituir por Rosca no cabo ou Rosca concentrada.",
      "triceps_oh":"&#128260; <strong>Troca opcional (S6/S11/S16):</strong> pode substituir por Tríceps corda (push-down).",
      "ext_unilat":"&#128260; <strong>Troca opcional (S6/S11/S16):</strong> pode substituir por Leg curl sentado unilateral.",
      "calf":"&#128260; <strong>Troca opcional (S6/S11/S16):</strong> pode alternar entre panturrilha em pé e sentada.",
      "prancha":"&#128260; <strong>Progressão opcional (S6/S11/S16):</strong> pode evoluir para prancha com toque de ombro ou extensão de perna alternada.",
      "face_pull_a":"&#128274; <strong>Manter &mdash; não trocar:</strong> fundamental para postura e cifose.",
      "face_pull_c":"&#128274; <strong>Manter &mdash; não trocar:</strong> fundamental para postura e cifose."
    };
    const isSwapWeek=(S.w===6||S.w===11||S.w===16);
    if(isSwapWeek&&!isCo&&!isCo2&&!isGM&&SWAPS[ex.id]){
      th+=`<div class="thint" style="background:#0f1f0f;color:#7ab87a;margin-top:6px;">${SWAPS[ex.id]}</div>`;
    }

    let rows="";
    for(let s=1;s<=sts;s++){
      const key=gk(S.w,day.id,ex.id,s);
      const sv=S.sets[key]||{};
      rows+=`<tr>
        <td class="set-num-cell">Série ${s}</td>
        <td><input class="set-input" type="number" min="0" step="0.5" placeholder="—" value="${sv.weight||""}" onchange="uS('${key}','weight',this.value)"></td>
        <td><input class="set-input" type="number" min="0" placeholder="—" value="${sv.reps||""}" onchange="uS('${key}','reps',this.value)"></td>
        <td><button class="set-done${sv.done?" checked":""}" onclick="tD('${key}',this)">${sv.done?"&#10003;":""}</button></td>
      </tr>`;
    }

    const card=document.createElement("div");
    card.className="ex-card";
    card.innerHTML=`
      <div class="ex-header">
        <div><div class="ex-name">${ex.name}${bh}</div>
        <div class="ex-meta">${sts} séries &middot; ${ex.rep} reps &middot; descanso ${ex.rest}${isD?" &middot; volume reduzido (deload)":""}</div></div>
        ${pr?`<span class="pr-badge">PR: ${pr}kg</span>`:""}
      </div>
      ${rirH}
      <table class="sets-table">
        <thead><tr><th>Série</th><th>Peso (kg)</th><th>Reps</th><th>OK</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${ph}${th}`;
    c.appendChild(card);
  });
}

function tWU(id){
  const body=document.getElementById(id);
  const chev=document.getElementById("chev-"+id);
  body.classList.toggle("open");
  chev.classList.toggle("open");
}

function uS(k,f,v){if(!S.sets[k])S.sets[k]={};S.sets[k][f]=f==="weight"?parseFloat(v):parseInt(v);SS();}
function tD(k,btn){if(!S.sets[k])S.sets[k]={};S.sets[k].done=!S.sets[k].done;SS();btn.classList.toggle("checked",S.sets[k].done);btn.innerHTML=S.sets[k].done?"&#10003;":"";}

function saveSession(){
  const day=DAYS[S.d];
  S.sessions["s"+S.w+"_"+day.id]={w:S.w,day:day.id,label:day.label,date:new Date().toLocaleDateString("pt-BR")};
  SS();
  const m=document.getElementById("save-msg");
  m.textContent="&#10003; Treino salvo!";
  setTimeout(()=>{m.textContent="";},2500);
}

function rProg(){
  const sess=Object.values(S.sessions);
  document.getElementById("ov-sessions").textContent=sess.length;
  document.getElementById("ov-week").textContent=S.w;
  document.getElementById("ov-phase").textContent=WEEKS[S.w-1].ph;
  const pct=Math.round((S.w/24)*100);
  document.getElementById("ov-pct").textContent=pct+"%";
  document.getElementById("prog-bar").style.width=pct+"%";
  document.getElementById("prog-label").textContent="Semana "+S.w+" de 24";
  const list=document.getElementById("progress-list");list.innerHTML="";
  const allEx=[];
  DAYS.forEach(d=>d.exercises.forEach(e=>{if(!allEx.find(x=>x.id===e.id))allEx.push({id:e.id,name:e.name,gm:e.gm});}));
  let has=false;
  allEx.forEach(ex=>{
    const hist=[];
    for(let w=1;w<=24;w++){
      DAYS.forEach(d=>{
        const k=gk(w,d.id,ex.id,1);
        if(S.sets[k]&&S.sets[k].weight)hist.push({w,weight:S.sets[k].weight,reps:S.sets[k].reps||"—"});
      });
    }
    if(!hist.length)return;
    has=true;
    let rows="";
    hist.forEach((h,i)=>{
      const prev=hist[i-1];
      let tr="—";
      if(prev)tr=h.weight>prev.weight?`<span class="trend-up">&#8593; +${(h.weight-prev.weight).toFixed(1)}kg</span>`:"—";
      rows+=`<tr><td>S${h.w}</td><td>${h.weight}kg</td><td>${h.reps}</td><td>${tr}</td></tr>`;
    });
    const card=document.createElement("div");
    card.className="prog-card";
    const gmb=ex.gm?` <span class="btipo bg">Glúteo Médio</span>`:"";
    card.innerHTML=`<div class="prog-ex-name">${ex.name}${gmb}</div>
      <table class="h-table"><thead><tr><th>Semana</th><th>Peso</th><th>Reps</th><th>Tendência</th></tr></thead><tbody>${rows}</tbody></table>`;
    list.appendChild(card);
  });
  if(!has)list.innerHTML=`<div class="empty-msg">Nenhum dado ainda. Salve seus treinos para ver o progresso!</div>`;
}

function rPlano(){
  const list=document.getElementById("plano-list");list.innerHTML="";
  WEEKS.forEach(wk=>{
    const ic=wk.w===S.w;
    const bc=wk.t==="d"?"bdeload":wk.t==="p"?"bprog":wk.t==="pico"?"bpico":"bvol";
    const bl=wk.t==="d"?"Deload":wk.t==="p"?"Progressão":wk.t==="pico"?"Pico Dezembro":"Volume";
    const card=document.createElement("div");
    card.className="plano-card"+(ic?" current":"");
    card.innerHTML=`
      <div class="plano-wlabel">Semana ${wk.w}${ic?" &middot; você está aqui":""}</div>
      <div class="plano-title">${wk.ph}</div>
      <div class="plano-desc">${wk.desc}</div>
      <div class="plano-footer">
        <div><span class="badge ${bc}">${bl}</span>${ic?`<span class="badge" style="margin-left:6px;background:#0c447c;color:#85b7eb">Atual</span>`:""}</div>
        <button class="go-btn" onclick="goW(${wk.w})">Ir para esta semana</button>
      </div>`;
    list.appendChild(card);
  });
}

function goW(w){S.w=w;SS();showScreen("treino");rWH();rEx();}

LS();rWH();rTabs();rEx();
</script>
</body>
</html>

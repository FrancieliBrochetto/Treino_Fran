<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Treino — Fran</title>
<meta name="color-scheme" content="dark">
<style>
  :root {
    --bg: #141413;
    --surface: #1e1e1c;
    --border: #2e2e2b;
    --border-strong: #444440;
    --text: #e8e8e2;
    --text-muted: #9b9b93;
    --text-hint: #6b6b65;
    --blue-bg: #0c2a45;
    --blue-text: #85b7eb;
    --green-bg: #122208;
    --green-text: #97c459;
    --amber-bg: #2a1c05;
    --amber-text: #fac775;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; color-scheme: dark; }

  .app-shell { max-width: 720px; margin: 0 auto; padding: 0 0 60px; }

  .topbar { background: #181816; border-bottom: 1px solid var(--border); padding: 14px 20px; position: sticky; top: 0; z-index: 10; }
  .topbar-title { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
  .nav { display: flex; gap: 6px; }
  .nav-btn { padding: 7px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; }
  .nav-btn:hover { background: var(--bg); }
  .nav-btn.active { background: #0c2a45; color: #85b7eb; border-color: transparent; }

  .content { padding: 20px; }
  .screen { display: none; }
  .screen.active { display: block; }

  .week-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .week-info .week-title { font-size: 18px; font-weight: 600; }
  .week-info .week-phase { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .week-nav { display: flex; align-items: center; gap: 8px; }
  .week-nav button { width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 16px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; }
  .week-nav button:hover { background: var(--bg); }
  .week-nav span { font-size: 13px; font-weight: 600; min-width: 28px; text-align: center; }

  .deload-banner { background: var(--amber-bg); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 14px; font-size: 13px; color: var(--amber-text); display: none; }
  .deload-banner.show { display: block; }

  .day-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .day-tab { padding: 7px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text-muted); cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; }
  .day-tab:hover { background: var(--surface); }
  .day-tab.active { background: var(--surface); color: var(--text); border-color: var(--border-strong); font-weight: 600; }

  .ex-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .ex-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 8px; }
  .ex-name { font-size: 14px; font-weight: 600; }
  .ex-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .pr-badge { font-size: 11px; padding: 3px 9px; border-radius: var(--radius-sm); background: #122208; color: #97c459; font-weight: 600; white-space: nowrap; flex-shrink: 0; }

  .sets-table { width: 100%; border-collapse: collapse; }
  .sets-table th { font-size: 11px; color: var(--text-hint); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; padding: 0 4px 8px; text-align: left; }
  .sets-table th:nth-child(2), .sets-table th:nth-child(3) { text-align: center; }
  .sets-table th:last-child { text-align: center; width: 44px; }
  .sets-table td { padding: 4px 4px; vertical-align: middle; }
  .set-num-cell { font-size: 12px; color: var(--text-muted); padding-right: 8px; white-space: nowrap; }
  .set-input { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 8px; font-size: 13px; width: 100%; background: #2a2a27; color: var(--text); text-align: center; outline: none; }
  .set-input:focus { border-color: #378add; box-shadow: 0 0 0 3px rgba(55,138,221,.12); }
  .set-done { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text-hint); margin: 0 auto; transition: all .15s; }
  .set-done:hover { border-color: #27500a; }
  .set-done.checked { background: #122208; border-color: #639922; color: #97c459; }

  .prog-hint { font-size: 12px; color: var(--text-hint); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .prog-hint.due { color: #854f0b; font-weight: 500; background: var(--amber-bg); border-radius: var(--radius-sm); padding: 8px 10px; border: none; margin-top: 10px; }

  .save-btn { width: 100%; padding: 13px; border-radius: var(--radius); background: #0f6e56; color: #9fe1cb; border: none; cursor: pointer; font-size: 15px; font-weight: 600; margin-top: 8px; transition: background .15s; }
  .save-btn:hover { background: #085041; }
  .save-msg { text-align: center; font-size: 13px; color: var(--green-text); margin-top: 8px; min-height: 20px; font-weight: 500; }

  .ov-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .ov-card { background: var(--bg); border-radius: var(--radius-sm); padding: 14px; }
  .ov-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .ov-val { font-size: 22px; font-weight: 700; }
  .ov-sub { font-size: 11px; color: var(--text-hint); margin-top: 2px; }

  .prog-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .prog-ex-name { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
  .h-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .h-table th { color: var(--text-hint); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; padding: 0 4px 6px; text-align: left; font-weight: 600; }
  .h-table td { padding: 5px 4px; border-top: 1px solid var(--border); color: var(--text-muted); }
  .h-table td:first-child { color: var(--text); font-weight: 500; }
  .trend-up { color: var(--green-text); font-weight: 600; }

  .plano-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
  .plano-card.current { border: 2px solid #378add; }
  .plano-week-label { font-size: 11px; color: var(--text-hint); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .plano-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .plano-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
  .plano-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
  .badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: var(--radius-sm); font-weight: 600; }
  .badge-vol { background: var(--blue-bg); color: var(--blue-text); }
  .badge-prog { background: var(--green-bg); color: var(--green-text); }
  .badge-deload { background: var(--amber-bg); color: var(--amber-text); }
  .badge-current { background: #378add; color: #fff; }
  .go-btn { font-size: 12px; padding: 5px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; cursor: pointer; color: var(--text-muted); }
  .go-btn:hover { background: var(--bg); }

  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
  .empty-msg { text-align: center; font-size: 13px; color: var(--text-hint); padding: 24px 0; }
</style>
</head>
<body>
<div class="app-shell">
  <div class="topbar">
    <div class="topbar-title">Meu Treino — Fran 💪</div>
    <nav class="nav">
      <button class="nav-btn active" onclick="showScreen('treino')">Treino</button>
      <button class="nav-btn" onclick="showScreen('progresso')">Progresso</button>
      <button class="nav-btn" onclick="showScreen('plano')">Plano de semanas</button>
    </nav>
  </div>

  <div class="content">
    <!-- TREINO -->
    <div class="screen active" id="screen-treino">
      <div class="week-header">
        <div class="week-info">
          <div class="week-title" id="week-title">Semana 1</div>
          <div class="week-phase" id="week-phase">Fase: Volume base</div>
        </div>
        <div class="week-nav">
          <button onclick="changeWeek(-1)">&#8249;</button>
          <span id="week-num">S1</span>
          <button onclick="changeWeek(1)">&#8250;</button>
        </div>
      </div>
      <div class="deload-banner" id="deload-banner">⚠️ <strong>Semana de deload:</strong> reduza o volume em ~40% (menos séries), mas mantenha a carga. Objetivo: recuperar sem perder força.</div>
      <div class="day-tabs" id="day-tabs"></div>
      <div id="exercises-container"></div>
      <button class="save-btn" onclick="saveSession()">Salvar treino</button>
      <div class="save-msg" id="save-msg"></div>
    </div>

    <!-- PROGRESSO -->
    <div class="screen" id="screen-progresso">
      <div class="section-title">Meu progresso</div>
      <div class="ov-grid">
        <div class="ov-card"><div class="ov-label">Treinos salvos</div><div class="ov-val" id="ov-sessions">0</div></div>
        <div class="ov-card"><div class="ov-label">Semana atual</div><div class="ov-val" id="ov-week">1</div><div class="ov-sub" id="ov-phase">Volume base</div></div>
        <div class="ov-card"><div class="ov-label">Próxima progressão</div><div class="ov-val" id="ov-next">S3</div><div class="ov-sub">aumento de carga</div></div>
      </div>
      <div id="progress-list"></div>
    </div>

    <!-- PLANO -->
    <div class="screen" id="screen-plano">
      <div class="section-title">Plano de 12 semanas</div>
      <div id="plano-list"></div>
    </div>
  </div>
</div>

<script>
const DAYS = [
  {id:'supA', label:'Segunda — Superior A (Peito + Ombro)', short:'Seg', exercises:[
    {id:'supino_reto', name:'Supino reto c/ barra', sets:4, repsTarget:'6–8', rest:'2–3 min', tipo:'composto', prog:2.5},
    {id:'supino_inc', name:'Supino inclinado halteres', sets:4, repsTarget:'8–10', rest:'90s', tipo:'composto', prog:2.5},
    {id:'desenv_halt', name:'Desenvolvimento halteres', sets:3, repsTarget:'8–10', rest:'90s', tipo:'composto', prog:2.5},
    {id:'elev_lat', name:'Elevação lateral cabos', sets:3, repsTarget:'12–15', rest:'60s', tipo:'isolamento', prog:1},
    {id:'face_pull', name:'Face pull corda', sets:3, repsTarget:'15', rest:'60s', tipo:'isolamento', prog:1},
  ]},
  {id:'infA', label:'Terça — Inferior A (Glúteo + Posterior)', short:'Ter', exercises:[
    {id:'hip_thrust', name:'Hip thrust c/ barra', sets:4, repsTarget:'8–10', rest:'2 min', tipo:'composto', prog:2.5},
    {id:'bulgaro', name:'Agachamento búlgaro', sets:3, repsTarget:'10–12', rest:'90s', tipo:'composto', prog:2.5},
    {id:'stiff', name:'Stiff-leg deadlift halteres', sets:4, repsTarget:'8–10', rest:'90s', tipo:'composto', prog:2.5},
    {id:'leg_curl', name:'Cadeira flexora', sets:3, repsTarget:'12–15', rest:'60s', tipo:'isolamento', prog:1},
    {id:'abducao', name:'Abdução de quadril cabo', sets:3, repsTarget:'15', rest:'60s', tipo:'isolamento', prog:1},
  ]},
  {id:'supB', label:'Sábado — Superior B (Costas + Bíceps + Tríceps)', short:'Sáb', exercises:[
    {id:'pullup', name:'Barra fixa / Lat pulldown', sets:4, repsTarget:'6–8 / 8–10', rest:'2–3 min', tipo:'composto', prog:2.5},
    {id:'remada_unilat', name:'Remada unilateral halter', sets:4, repsTarget:'8–10', rest:'90s', tipo:'composto', prog:2.5},
    {id:'remada_chest', name:'Remada chest supported', sets:3, repsTarget:'10–12', rest:'90s', tipo:'composto', prog:2.5},
    {id:'pullover', name:'Pullover polia alta', sets:3, repsTarget:'12–15', rest:'60s', tipo:'isolamento', prog:1},
    {id:'triceps_corda', name:'Tríceps polia corda', sets:3, repsTarget:'12–15', rest:'60s', tipo:'isolamento', prog:1},
    {id:'rosca_direta', name:'Rosca direta barra/halt.', sets:3, repsTarget:'10–12', rest:'60s', tipo:'isolamento', prog:1},
  ]},
  {id:'infB', label:'Domingo — Inferior B (Quadríceps + Glúteo)', short:'Dom', exercises:[
    {id:'leg_press', name:'Leg press 45°', sets:4, repsTarget:'8–10', rest:'2 min', tipo:'composto', prog:2.5},
    {id:'sumô', name:'Agachamento sumô c/ halter', sets:3, repsTarget:'10–12', rest:'90s', tipo:'composto', prog:2.5},
    {id:'leg_ext', name:'Cadeira extensora', sets:4, repsTarget:'12–15', rest:'60s', tipo:'isolamento', prog:1},
    {id:'hip_thrust_unilat', name:'Hip thrust unilateral', sets:3, repsTarget:'12', rest:'60s', tipo:'isolamento', prog:1},
    {id:'calf', name:'Panturrilha em pé', sets:4, repsTarget:'15–20', rest:'45s', tipo:'isolamento', prog:1},
  ]},
];

const WEEKS = [
  {w:1,phase:'Volume base',desc:'Aprenda os movimentos com carga moderada. Foco total em técnica.',tipo:'normal'},
  {w:2,phase:'Volume base',desc:'Adicione 1 série nos compostos se a técnica estiver consistente.',tipo:'normal'},
  {w:3,phase:'Progressão de carga',desc:'Aumente 2,5 kg nos compostos que atingiu o limite superior de reps.',tipo:'prog'},
  {w:4,phase:'Deload',desc:'Reduza o volume em 40% (menos séries). Mantenha a carga. Recuperação ativa.',tipo:'deload'},
  {w:5,phase:'Volume + técnicas avançadas',desc:'Adicione drop sets no último set dos isolamentos apenas (elevação lateral, rosca, tríceps, extensora, abdução). Nunca em compostos pesados.',tipo:'normal'},
  {w:6,phase:'Volume + técnicas avançadas',desc:'Experimente rest-pause em 1 exercício de isolamento por dia. Compostos pesados (supino, hip thrust, leg press) continuam normais.',tipo:'normal'},
  {w:7,phase:'Progressão de carga',desc:'Aumente 2,5 kg nos compostos. Avalie qual técnica avançada funcionou melhor.',tipo:'prog'},
  {w:8,phase:'Deload',desc:'Semana de recuperação. 40% menos volume. Bom momento para ajustar técnica.',tipo:'deload'},
  {w:9,phase:'Novo ciclo — volume alto',desc:'Inicie novo bloco. Pode trocar 1 exercício de isolamento por dia se quiser variação.',tipo:'normal'},
  {w:10,phase:'Novo ciclo — volume alto',desc:'Continue com o volume máximo consolidado.',tipo:'normal'},
  {w:11,phase:'Intensificação',desc:'Reduza 1 série por exercício, mas aumente a carga em ~5% nos compostos.',tipo:'prog'},
  {w:12,phase:'Deload + avaliação',desc:'Semana de deload. Registre seus PRs e compare com a semana 1. Planeje o próximo ciclo.',tipo:'deload'},
];

let state = {currentWeek:1, currentDayIdx:0, sessions:{}, setData:{}};

function loadState() {
  try { const s = localStorage.getItem('fran_treino'); if(s) state = JSON.parse(s); } catch(e){}
}
function saveState() {
  try { localStorage.setItem('fran_treino', JSON.stringify(state)); } catch(e){}
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  const idx = ['treino','progresso','plano'].indexOf(id);
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if(id==='progresso') renderProgress();
  if(id==='plano') renderPlano();
}

function changeWeek(dir) {
  state.currentWeek = Math.max(1, Math.min(12, state.currentWeek + dir));
  saveState(); renderWeekHeader(); renderExercises();
}

function renderWeekHeader() {
  const wk = WEEKS[state.currentWeek - 1];
  document.getElementById('week-title').textContent = 'Semana ' + state.currentWeek;
  document.getElementById('week-phase').textContent = 'Fase: ' + wk.phase;
  document.getElementById('week-num').textContent = 'S' + state.currentWeek;
  document.getElementById('deload-banner').classList.toggle('show', wk.tipo === 'deload');
}

function renderDayTabs() {
  const c = document.getElementById('day-tabs'); c.innerHTML = '';
  DAYS.forEach((day,i) => {
    const b = document.createElement('button');
    b.className = 'day-tab' + (i===state.currentDayIdx?' active':'');
    b.textContent = day.short;
    b.onclick = () => { state.currentDayIdx = i; saveState(); renderDayTabs(); renderExercises(); };
    c.appendChild(b);
  });
}

function getKey(w, dayId, exId, s) { return 'w'+w+'_'+dayId+'_'+exId+'_s'+s; }

function getBestWeight(exId) {
  let best = 0;
  Object.keys(state.setData).forEach(k => {
    if(k.includes('_'+exId+'_s')) { const w = state.setData[k].weight||0; if(w>best) best=w; }
  });
  return best > 0 ? best : null;
}

function nextProgWeek(current, every) {
  let n = current+1;
  while(n<=12 && n%every!==0) n++;
  return n<=12 ? n : null;
}

function renderExercises() {
  const day = DAYS[state.currentDayIdx];
  const wk = WEEKS[state.currentWeek-1];
  const isDeload = wk.tipo==='deload';
  const c = document.getElementById('exercises-container'); c.innerHTML='';

  day.exercises.forEach(ex => {
    const pr = getBestWeight(ex.id);
    const progDue = (wk.tipo === 'prog');
    const npw = WEEKS.findIndex((w, i) => i >= state.currentWeek && w.tipo === 'prog') + 1 || null;
    const isComposto = ex.tipo === 'composto';
    const progKg = ex.prog || (isComposto ? 2.5 : 1);
    const setsToShow = isDeload ? Math.max(2, ex.sets-2) : (state.currentWeek === 11 && isComposto ? ex.sets-1 : ex.sets);

    // Week-specific technique hints shown directly on the card
    let techniqueHint = '';
    if (state.currentWeek === 5 && !isComposto) {
      techniqueHint = `<div class="prog-hint" style="background:#1a1a08;color:#b8a838;border-radius:6px;padding:8px 10px;border:none;margin-top:8px;">
        💡 <strong>Semana 5 — Drop set:</strong> na última série deste exercício, ao falhar, reduza o peso em ~30% e continue até falhar de novo. Sem descanso entre as cargas.
      </div>`;
    } else if (state.currentWeek === 6 && !isComposto) {
      techniqueHint = `<div class="prog-hint" style="background:#1a1a08;color:#b8a838;border-radius:6px;padding:8px 10px;border:none;margin-top:8px;">
        💡 <strong>Semana 6 — Rest-pause (escolha 1 isolamento por dia):</strong> na última série, ao falhar, descanse 10–15s e faça mais algumas reps. Repita 1–2x. Aplique em apenas 1 exercício isolado por treino.
      </div>`;
    } else if (state.currentWeek === 9 || state.currentWeek === 10) {
      techniqueHint = `<div class="prog-hint" style="color:var(--text-hint);margin-top:8px;">
        🔄 Novo ciclo: se quiser variar, pode trocar este isolamento por outro que trabalhe o mesmo músculo.
      </div>`;
    } else if (state.currentWeek === 11 && isComposto) {
      techniqueHint = `<div class="prog-hint" style="background:#0c2a45;color:#85b7eb;border-radius:6px;padding:8px 10px;border:none;margin-top:8px;">
        💪 <strong>Semana 11 — Intensificação:</strong> reduza 1 série neste exercício, mas aumente a carga em ~5%.
      </div>`;
    }

    let progHtml = progDue
      ? `<div class="prog-hint due">↑ Semana de progressão! Se completou todas as séries com boa forma, aumente <strong>${progKg} kg</strong> neste exercício.</div>`
      : `<div class="prog-hint">Próxima progressão: ${npw ? 'semana '+npw : 'fim do ciclo'}</div>`;

    let rows = '';
    for(let s=1; s<=setsToShow; s++) {
      const key = getKey(state.currentWeek, day.id, ex.id, s);
      const saved = state.setData[key]||{};
      rows += `<tr>
        <td class="set-num-cell">Série ${s}</td>
        <td><input class="set-input" type="number" min="0" step="0.5" placeholder="—" value="${saved.weight||''}" onchange="updateSet('${key}','weight',this.value)"></td>
        <td><input class="set-input" type="number" min="0" placeholder="—" value="${saved.reps||''}" onchange="updateSet('${key}','reps',this.value)"></td>
        <td><button class="set-done${saved.done?' checked':''}" onclick="toggleDone('${key}',this)">${saved.done?'✓':''}</button></td>
      </tr>`;
    }

    const card = document.createElement('div');
    card.className = 'ex-card';
    card.innerHTML = `
      <div class="ex-header">
        <div>
          <div class="ex-name">${ex.name} <span style="font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;vertical-align:middle;${isComposto ? 'background:#0c2a45;color:#85b7eb' : 'background:#1a1a08;color:#b8a838'}">${isComposto ? 'Composto' : 'Isolamento'}${progDue ? ' · +'+progKg+'kg esta semana' : ''}</span></div>
          <div class="ex-meta">${setsToShow} séries · ${ex.repsTarget} reps · descanso ${ex.rest}${isDeload?' · volume reduzido (deload)':''}</div>
        </div>
        ${pr ? `<span class="pr-badge">PR: ${pr} kg</span>` : ''}
      </div>
      <table class="sets-table">
        <thead><tr><th>Série</th><th>Peso (kg)</th><th>Reps</th><th>OK</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${progHtml}
      ${techniqueHint}`;
    c.appendChild(card);
  });
}

function updateSet(key, field, value) {
  if(!state.setData[key]) state.setData[key]={};
  state.setData[key][field] = field==='weight' ? parseFloat(value) : parseInt(value);
  saveState();
}

function toggleDone(key, btn) {
  if(!state.setData[key]) state.setData[key]={};
  state.setData[key].done = !state.setData[key].done;
  saveState();
  btn.classList.toggle('checked', state.setData[key].done);
  btn.textContent = state.setData[key].done ? '✓' : '';
}

function saveSession() {
  const day = DAYS[state.currentDayIdx];
  const k = 'sess_w'+state.currentWeek+'_'+day.id;
  state.sessions[k] = {week:state.currentWeek, day:day.id, label:day.label, date:new Date().toLocaleDateString('pt-BR')};
  saveState();
  const msg = document.getElementById('save-msg');
  msg.textContent = '✓ Treino salvo com sucesso!';
  setTimeout(()=>{ msg.textContent=''; }, 2500);
}

function renderProgress() {
  const sessions = Object.values(state.sessions);
  document.getElementById('ov-sessions').textContent = sessions.length;
  document.getElementById('ov-week').textContent = state.currentWeek;
  document.getElementById('ov-phase').textContent = WEEKS[state.currentWeek-1].phase;
  let np = state.currentWeek;
  while(np<=12 && WEEKS[np-1].tipo!=='prog') np++;
  document.getElementById('ov-next').textContent = np<=12 ? 'S'+np : '—';

  const list = document.getElementById('progress-list'); list.innerHTML='';
  const allEx = [];
  DAYS.forEach(d => d.exercises.forEach(e => { if(!allEx.find(x=>x.id===e.id)) allEx.push({id:e.id,name:e.name}); }));

  let hasData = false;
  allEx.forEach(ex => {
    const history = [];
    for(let w=1; w<=12; w++) {
      DAYS.forEach(d => {
        const key = getKey(w, d.id, ex.id, 1);
        if(state.setData[key] && state.setData[key].weight) {
          history.push({week:w, weight:state.setData[key].weight, reps:state.setData[key].reps||'—'});
        }
      });
    }
    if(!history.length) return;
    hasData = true;
    let rows = '';
    history.forEach((h,i) => {
      const prev = history[i-1];
      let trend = '—';
      if(prev) trend = h.weight > prev.weight ? `<span class="trend-up">↑ +${(h.weight-prev.weight).toFixed(1)}kg</span>` : '—';
      rows += `<tr><td>S${h.week}</td><td>${h.weight} kg</td><td>${h.reps}</td><td>${trend}</td></tr>`;
    });
    const card = document.createElement('div');
    card.className = 'prog-card';
    card.innerHTML = `<div class="prog-ex-name">${ex.name}</div>
      <table class="h-table">
        <thead><tr><th>Semana</th><th>Peso</th><th>Reps</th><th>Tendência</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    list.appendChild(card);
  });

  if(!hasData) {
    list.innerHTML = '<div class="empty-msg">Nenhum dado ainda. Salve seus treinos para ver o progresso aqui!</div>';
  }
}

function renderPlano() {
  const list = document.getElementById('plano-list'); list.innerHTML='';
  WEEKS.forEach(wk => {
    const isCurrent = wk.w === state.currentWeek;
    const badgeClass = wk.tipo==='deload'?'badge-deload': wk.tipo==='prog'?'badge-prog':'badge-vol';
    const badgeLabel = wk.tipo==='deload'?'Deload': wk.tipo==='prog'?'Progressão de carga':'Volume';
    const card = document.createElement('div');
    card.className = 'plano-card' + (isCurrent?' current':'');
    card.innerHTML = `
      <div class="plano-week-label">Semana ${wk.w}${isCurrent?' · você está aqui':''}</div>
      <div class="plano-title">${wk.phase}</div>
      <div class="plano-desc">${wk.desc}</div>
      <div class="plano-footer">
        <div>
          <span class="badge ${badgeClass}">${badgeLabel}</span>
          ${isCurrent ? '<span class="badge" style="margin-left:6px;background:#0c447c;color:#85b7eb">Semana atual</span>' : ''}
        </div>
        <button class="go-btn" onclick="goToWeek(${wk.w})">Ir para esta semana</button>
      </div>`;
    list.appendChild(card);
  });
}

function goToWeek(w) {
  state.currentWeek = w;
  saveState();
  showScreen('treino');
  renderWeekHeader();
  renderExercises();
}

loadState();
renderWeekHeader();
renderDayTabs();
renderExercises();
</script>
</body>
